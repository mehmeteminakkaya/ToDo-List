{% include 'layout.html' %}

<div class="container py-5">
    <div class="form-container">
        <div class="form-card text-center">
            <div class="mb-4">
                <span style="font-size: 3rem;">🔐</span>
            </div>
            <h2>Tekrar Hoş Geldin!</h2>
            <p class="subtitle">İşlerini düzene koymaya devam edelim.</p>
            
            <form id="loginForm">
                <div class="form-group text-left">
                    <label>Kullanıcı Adı</label>
                    <input type="text" class="form-control form-input" name="username" 
                           placeholder="Kullanıcı adını gir" autocomplete="username" required>
                </div>
                <div class="form-group text-left">
                    <label>Şifre</label>
                    <input type="password" class="form-control form-input" name="password" 
                           placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-accent w-100 mt-3">Giriş Yap</button>
            </form>
            
            <div class="form-link">
                Hesabın yok mu? <a href="/auth/register-page">Hemen Kayıt Ol</a>
            </div>
        </div>
    </div>
</div>
